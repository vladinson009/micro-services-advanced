apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: ingress-srv
    annotations:
        nginx.ingress.kubernetes.io/use-regex: 'true'
spec:
    ingressClassName: nginx
    rules:
        - host: localhost
          http:
              paths:
                  - pathType: ImplementationSpecific
                    path: '/api/users(/|$)(.*)'
                    backend:
                        service:
                            name: auth-srv
                            port:
                                number: 3000
